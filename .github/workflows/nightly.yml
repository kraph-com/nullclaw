name: Nightly

on:
  schedule:
    - cron: '23 2 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Build even if this commit already has a successful nightly run.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly:
    uses: nullclaw/nullbuilder/.github/workflows/zig-nightly.yml@v1
    permissions:
      actions: read
      contents: write
    with:
      binary_name: nullclaw
      artifact_prefix: nullclaw
      publish_release: true
      release_tag: nightly
      release_title: NullClaw Nightly
      force: ${{ inputs.force || false }}
      # See release.yml for rationale — non-native engine set only
      # (postgres/redis/etc. link system libs that break cross-compile),
      # restricted to the linux musl targets we actually deploy.
      build_args: "-Dengines=base,sqlite,markdown,api,memory"
      targets_json: >-
        [{"os":"ubuntu-latest","target":"linux-x86_64","zig_target":"x86_64-linux-musl","zig_cpu":"","ext":""},{"os":"ubuntu-latest","target":"linux-aarch64","zig_target":"aarch64-linux-musl","zig_cpu":"","ext":""}]
