name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    uses: nullclaw/nullbuilder/.github/workflows/zig-release.yml@v1
    permissions:
      contents: write
      packages: write
    secrets: inherit
    with:
      binary_name: nullclaw
      artifact_prefix: nullclaw
      publish_docker: true
      # Engine selection: the `postgres` engine does
      # `linkSystemLibrary("pq")` (build.zig:528) which can't
      # cross-compile to musl/android/riscv/windows — that's why
      # `-Dengines=all` failed every target. We ship the upstream-proven
      # non-native engine set instead. sqlite gives hosted sidecars
      # persistent per-instance memory + summarizer (lives in the
      # /data volume, runs on the Alpine sidecar). The `api` engine
      # (pure HTTP, no native lib) is the path to "customer's own
      # Postgres" later via the instance PostgREST endpoint — no rebuild
      # needed. redis/lancedb/clickhouse/kg/lucid omitted (native deps
      # we don't need).
      build_args: "-Dengines=base,sqlite,markdown,api,memory"
      # We only deploy linux-x86_64 / linux-aarch64 sidecars (Alpine →
      # musl). Restricting the matrix drops the exotic targets we never
      # ship and cuts build time + failure surface.
      targets_json: >-
        [{"os":"ubuntu-latest","target":"linux-x86_64","zig_target":"x86_64-linux-musl","zig_cpu":"","ext":""},{"os":"ubuntu-latest","target":"linux-aarch64","zig_target":"aarch64-linux-musl","zig_cpu":"","ext":""}]
