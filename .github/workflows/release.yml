name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    uses: nullclaw/nullbuilder/.github/workflows/zig-release.yml@v1
    permissions:
      contents: write
      packages: write
    secrets: inherit
    with:
      binary_name: nullclaw
      artifact_prefix: nullclaw
      publish_docker: true
      # Build with every memory engine compiled in (sqlite, postgres,
      # redis, lucid, hybrid, api, markdown, …) so hosted-NullClaw
      # operators can pick the backend at config-time without rebuilding.
      # Upstream's prebuilt releases omit postgres which breaks the
      # "use the customer's Kraph instance Postgres as the memory store"
      # flow; this kraph-com fork ships all backends.
      build_args: "-Dengines=all"
